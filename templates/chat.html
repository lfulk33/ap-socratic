<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ unit.title }} - AP Socratic</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main>
    <p><a href="{{ url_for('index') }}">&larr; Subjects</a></p>
    <h1>{{ unit.title }}</h1>

    <details class="unit-context">
      <summary>Essential questions &amp; example texts</summary>
      <ul>
        {% for q in unit.essential_questions %}
          <li>{{ q }}</li>
        {% endfor %}
      </ul>
      <p class="texts-label">Example texts (or bring your own):</p>
      <ul class="texts">
        {% for t in unit.texts %}
          <li>{{ t }}</li>
        {% endfor %}
      </ul>
    </details>

    <div id="chat-log" class="chat-log">
      {% for m in messages %}
        <div class="msg {{ m.role }}">{{ m.content }}</div>
      {% endfor %}
    </div>
    <form id="chat-form" data-subject-id="{{ subject_id }}" data-unit-id="{{ unit.id }}">
      <input id="chat-input" type="text" autocomplete="off" placeholder="Type your answer or question..." autofocus>
      <button type="submit">Send</button>
    </form>
  </main>

  <script>
    const log = document.getElementById("chat-log");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("chat-input");
    const chatUrl = `/subject/${form.dataset.subjectId}/unit/${form.dataset.unitId}/chat`;

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    log.scrollTop = log.scrollHeight;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      addMessage("user", message);
      input.value = "";
      input.disabled = true;

      try {
        const res = await fetch(chatUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        if (data.error) {
          addMessage("assistant", "Error: " + data.error);
        } else {
          addMessage("assistant", data.reply);
        }
      } catch (err) {
        addMessage("assistant", "Something went wrong. Please try again.");
      } finally {
        input.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
